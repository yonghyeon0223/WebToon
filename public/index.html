<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebToon GUI</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header>
  <div class="title-block">
    <h1 id="title">WebToon</h1>
    <div class="passage" id="passage">—</div>
  </div>
  <div class="model-selector">
    <label>Default model
      <select id="modelSelect">
        <option value="flash2">flash2 — cheap iteration</option>
        <option value="pro">pro — final quality</option>
      </select>
    </label>
  </div>
</header>

<main>
  <div class="image-stage" id="imageStage">
    <div class="empty">Pick a page from the strip below to start.</div>
  </div>

  <div class="page-info" id="pageInfo"></div>

  <div class="actions" id="actions" hidden>
    <button id="regenFlash" class="btn primary">Regenerate with flash2</button>
    <button id="regenPro" class="btn">Regenerate with pro</button>
  </div>

  <details class="archives-block" id="archivesBlock" hidden>
    <summary><span id="archivesLabel">Archives</span></summary>
    <div class="archives-grid" id="archivesGrid"></div>
  </details>
</main>

<footer>
  <div class="strip-wrapper">
    <div class="legend">
      <span class="dot has-image"></span> generated
      <span class="dot"></span> missing
    </div>
    <div class="page-strip" id="pageStrip"></div>
  </div>
</footer>

<div id="toast" class="toast" hidden></div>

<script src="/app.js"></script>
</body>
</html>
