<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebToon GUI</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<main>
  <div class="image-stage" id="imageStage">
    <div class="empty">Pick a page from the strip below to start.</div>
  </div>

  <aside class="controls">
    <div class="control-group">
      <div class="passage-info" id="passage">—</div>
      <div class="page-info" id="pageInfo">No page selected</div>
    </div>

    <div class="control-group">
      <label class="field-label">Default model</label>
      <select id="modelSelect">
        <option value="flash2">flash2 — cheap iteration</option>
        <option value="pro">pro — final quality</option>
      </select>
    </div>

    <div class="control-group" id="actions" hidden>
      <button id="regenFlash" class="btn primary">Regenerate with flash2</button>
      <button id="regenPro" class="btn">Regenerate with pro</button>
    </div>

    <details class="control-group archives-block" id="archivesBlock" hidden>
      <summary><span id="archivesLabel">Archives</span></summary>
      <div class="archives-grid" id="archivesGrid"></div>
    </details>
  </aside>
</main>

<footer>
  <div class="strip-wrapper">
    <div class="legend">
      <span class="dot has-image"></span> generated
      <span class="dot"></span> missing
    </div>
    <div class="page-strip" id="pageStrip"></div>
  </div>
</footer>

<div id="toast" class="toast" hidden></div>

<script src="/app.js"></script>
</body>
</html>
