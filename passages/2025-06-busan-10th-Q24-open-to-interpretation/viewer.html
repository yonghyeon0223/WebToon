<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mr. Realistic Series — Webtoon Reader</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #1a1a1a;
      color: #ddd;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }
    .reader {
      width: 100%;
      max-width: 480px;
      background: #0d0d0d;
      box-shadow: 0 0 60px rgba(0, 0, 0, 0.6);
      position: relative;
    }
    .header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid #2a2a2a;
      text-align: center;
    }
    .header .title {
      font-size: 15px;
      letter-spacing: 0.02em;
      color: #f0e6d2;
    }
    .header .sub {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
    }
    .pages {
      display: flex;
      flex-direction: column;
    }
    .page {
      position: relative;
      background: #050505;
    }
    .page img {
      display: block;
      width: 100%;
      height: auto;
    }
    .page .label {
      position: absolute;
      bottom: 8px;
      left: 8px;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.45);
      background: rgba(0, 0, 0, 0.4);
      padding: 2px 6px;
      border-radius: 3px;
      pointer-events: none;
    }
    .footer {
      padding: 32px 20px 48px;
      text-align: center;
      color: #555;
      font-size: 12px;
      border-top: 1px solid #2a2a2a;
    }
    .empty {
      padding: 80px 20px;
      text-align: center;
      color: #666;
      font-size: 13px;
    }
    .empty code {
      background: #2a2a2a;
      padding: 2px 6px;
      border-radius: 3px;
      color: #f0e6d2;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="reader">
    <div class="header">
      <div class="title">Mr. Realistic 시리즈</div>
      <div class="sub">2025-06 부산 고1 영어 모의고사 Q24 — Open to Interpretation</div>
    </div>
    <div id="pages" class="pages"></div>
    <div id="footer" class="footer">— end —</div>
  </div>

  <script>
    const TOTAL_PAGES = 107;
    const IMAGE_DIR = 'images/pages';
    const container = document.getElementById('pages');
    const footer = document.getElementById('footer');

    const tasks = [];
    for (let i = 1; i <= TOTAL_PAGES; i++) {
      const id = 'p' + String(i).padStart(2, '0');
      const url = IMAGE_DIR + '/' + id + '.png';
      tasks.push(
        new Promise((resolve) => {
          const probe = new Image();
          probe.onload = () => resolve({ id, url, exists: true });
          probe.onerror = () => resolve({ id, url, exists: false });
          probe.src = url;
        }),
      );
    }

    Promise.all(tasks).then((results) => {
      const present = results.filter((r) => r.exists);
      if (present.length === 0) {
        container.innerHTML =
          '<div class="empty">No generated pages yet.<br/>Run <code>npm run generate</code> first.</div>';
        footer.style.display = 'none';
        return;
      }
      for (const { id, url } of present) {
        const wrap = document.createElement('div');
        wrap.className = 'page';

        const img = document.createElement('img');
        img.loading = 'lazy';
        img.src = url;
        img.alt = id;

        const label = document.createElement('div');
        label.className = 'label';
        label.textContent = id;

        wrap.appendChild(img);
        wrap.appendChild(label);
        container.appendChild(wrap);
      }
    });
  </script>
</body>
</html>
