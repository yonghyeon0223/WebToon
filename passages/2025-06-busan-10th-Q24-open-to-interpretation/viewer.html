<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <title>Mr. Realistic — 컷툰</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      overscroll-behavior: none;
    }
    body {
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
              env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 10;
      font-size: 12px;
      flex-shrink: 0;
    }
    .topbar .title { color: #f0e6d2; }
    .topbar .indicator {
      color: #999;
      font-variant-numeric: tabular-nums;
    }
    .stage {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      min-height: 0;
    }
    .stage img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      display: block;
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }
    .tap-zone {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 40%;
      z-index: 5;
      cursor: pointer;
    }
    .tap-zone.left { left: 0; }
    .tap-zone.right { right: 0; }
    .controls {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 10;
      flex-shrink: 0;
    }
    .controls button {
      flex: 1;
      padding: 16px 0;
      border: none;
      background: rgba(255, 255, 255, 0.08);
      color: #f0e6d2;
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.12s ease;
      min-height: 44px;
    }
    .controls button:not(:disabled):hover { background: rgba(255, 255, 255, 0.14); }
    .controls button:not(:disabled):active { background: rgba(255, 255, 255, 0.22); }
    .controls button:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }
    .empty {
      padding: 80px 24px;
      text-align: center;
      color: #888;
      font-size: 14px;
      line-height: 1.7;
    }
    .empty code {
      background: #2a2a2a;
      padding: 3px 8px;
      border-radius: 4px;
      color: #f0e6d2;
      font-size: 12px;
      margin: 0 2px;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title">Mr. Realistic 시리즈</div>
    <div class="indicator" id="indicator">— / —</div>
  </div>
  <div class="stage" id="stage">
    <div class="tap-zone left" id="zoneLeft" aria-label="previous"></div>
    <div class="tap-zone right" id="zoneRight" aria-label="next"></div>
  </div>
  <div class="controls">
    <button id="btnPrev" type="button">← 이전</button>
    <button id="btnNext" type="button">다음 →</button>
  </div>

  <script>
    const TOTAL = 107;
    const IMAGE_DIR = 'images/pages';
    const indicator = document.getElementById('indicator');
    const stage = document.getElementById('stage');
    const btnPrev = document.getElementById('btnPrev');
    const btnNext = document.getElementById('btnNext');
    const zoneLeft = document.getElementById('zoneLeft');
    const zoneRight = document.getElementById('zoneRight');

    let availableIds = [];
    let cursor = 0;

    const pad = (n) => String(n).padStart(2, '0');

    function discover() {
      const tasks = [];
      for (let i = 1; i <= TOTAL; i++) {
        const id = 'p' + pad(i);
        const url = IMAGE_DIR + '/' + id + '.png';
        tasks.push(new Promise((resolve) => {
          const probe = new Image();
          probe.onload = () => resolve({ id, url, exists: true });
          probe.onerror = () => resolve({ id, url, exists: false });
          probe.src = url;
        }));
      }
      return Promise.all(tasks).then((rs) => rs.filter((r) => r.exists));
    }

    function clearStage() {
      for (const node of stage.querySelectorAll('img, .empty')) node.remove();
    }

    function render() {
      clearStage();

      if (availableIds.length === 0) {
        const e = document.createElement('div');
        e.className = 'empty';
        e.innerHTML = 'No generated pages yet.<br/>Run <code>npm run generate</code> first.';
        stage.appendChild(e);
        indicator.textContent = '0 / 0';
        btnPrev.disabled = true;
        btnNext.disabled = true;
        return;
      }

      const current = availableIds[cursor];
      const img = document.createElement('img');
      img.src = current.url;
      img.alt = current.id;
      stage.insertBefore(img, zoneLeft);

      indicator.textContent = `${current.id}  ·  ${cursor + 1} / ${availableIds.length}`;
      btnPrev.disabled = cursor === 0;
      btnNext.disabled = cursor === availableIds.length - 1;

      // Preload neighbors for snappy nav
      [cursor - 1, cursor + 1].forEach((idx) => {
        if (idx >= 0 && idx < availableIds.length) {
          const pre = new Image();
          pre.src = availableIds[idx].url;
        }
      });

      // Sync URL hash so refresh / share preserves position
      history.replaceState(null, '', '#' + current.id);
    }

    function go(delta) {
      const next = cursor + delta;
      if (next < 0 || next >= availableIds.length) return;
      cursor = next;
      render();
    }

    // Buttons + tap zones
    btnPrev.addEventListener('click', () => go(-1));
    btnNext.addEventListener('click', () => go(1));
    zoneLeft.addEventListener('click', () => go(-1));
    zoneRight.addEventListener('click', () => go(1));

    // Keyboard (desktop)
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') go(-1);
      else if (e.key === 'ArrowRight' || e.key === ' ') {
        e.preventDefault();
        go(1);
      }
    });

    // Touch swipe (mobile)
    let touchStartX = null;
    let touchStartY = null;
    stage.addEventListener('touchstart', (e) => {
      if (e.touches.length !== 1) return;
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });
    stage.addEventListener('touchend', (e) => {
      if (touchStartX === null) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      touchStartX = null;
      touchStartY = null;
      // Horizontal-dominant swipe of >50px
      if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0) go(-1);  // swipe right → previous
        else go(1);          // swipe left  → next
      }
    }, { passive: true });

    // Init
    discover().then((results) => {
      availableIds = results;
      const hash = window.location.hash.replace('#', '');
      const found = availableIds.findIndex((r) => r.id === hash);
      if (found >= 0) cursor = found;
      render();
    });
  </script>
</body>
</html>
